name: Android verification

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android 16 SDK
        run: sdkmanager "platforms;android-36" "build-tools;36.1.0"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v6

      - name: Verify wrapper and shell syntax
        run: |
          test -x gradlew
          sh -n hevc/preflight.sh
          sh -n hevc/codecfix.sh

      - name: Run project verification
        run: ./gradlew verify :app:assembleDebug

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.*
          if-no-files-found: ignore
